<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUVO - Classic DIY</title>
    <style>
        :root {
            --baby-pink: #ffdae0;
            --classic-gold: #c5a059;
            --soft-white: #ffffff;
            --text-dark: #333;
        }

        body { font-family: 'Georgia', serif; margin: 0; background: var(--soft-white); overflow-x: hidden; }

        /* 1. SPLASH SCREEN (Pops out when opening) */
        #splash {
            position: fixed;
            width: 100%; height: 100vh;
            background: var(--baby-pink);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }
        .logo-pop {
            font-size: 60px; font-weight: bold; letter-spacing: 15px;
            color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            animation: popOut 1.5s ease-out forwards;
        }
        @keyframes popOut {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* 2. MAIN APP CONTENT */
        header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .product-container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Product Image & Details */
        .product-img { width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .details-card { width: 85%; background: white; padding: 20px; margin-top: -30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .price { color: #27ae60; font-size: 24px; font-weight: bold; margin: 10px 0; }

        /* 3. REVIEWS & SUGGESTIONS */
        .section-title { padding: 20px; font-size: 20px; border-top: 10px solid var(--baby-pink); margin-top: 20px; }
        .review-box { margin: 10px 20px; padding: 15px; background: #f9f9f9; border-radius: 10px; font-style: italic; }
        .suggestion-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 40px; }
        .suggest-item { min-width: 120px; height: 120px; background: var(--baby-pink); border-radius: 15px; }

        /* Utility */
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-pop">ZUVO</div>
        <p style="color: white; letter-spacing: 2px; margin-top: 10px;">HANDCRAFTED CLASSICS</p>
    </div>

    <header>
        <h2 style="letter-spacing: 5px;">ZUVO</h2>
    </header>

    <div class="product-container">
        <div class="product-img" style="height: 350px; background: #eee; display: flex; align-items: center; justify-content: center; color: #999;">
            [ Product Image Here ]
        </div>
        
        <div class="details-card">
            <h1 style="margin: 0;">DIY Heritage Jacket</h1>
            <p style="color: gray;">Custom hand-embroidery on premium denim. Single piece edition.</p>
            <div class="price">₹4,500</div>
            <button style="width: 100%; padding: 15px; background: var(--classic-gold); color: white; border: none; border-radius: 10px; font-weight: bold;">PLACE BOLI</button>
        </div>
    </div>

    <div class="section-title">Customer Reviews</div>
    <div class="review-box">"The quality is amazing, fits like a dream!" - Rahul S.</div>
    <div class="review-box">"Love the skin-tone customizer, very helpful." - Priya M.</div>

    <div class="section-title">More Suggestions</div>
    <div class="suggestion-scroll">
        <div class="suggest-item"></div>
        <div class="suggest-item"></div>
        <div class="suggest-item"></div>
        <div class="suggest-item"></div>
    </div>

    <script>
        // Automatic Splash Screen Close
        setTimeout(() => {
            document.getElementById('splash').classList.add('hidden');
        }, 3000); // 3 seconds pop out
    </script>

</body>
</html>
